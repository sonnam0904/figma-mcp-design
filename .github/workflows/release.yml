name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    name: Semantic release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !(github.event.head_commit && contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Node dependencies
        run: npm ci

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
